schema_version = 1
id = "gstack-claude"
aliases = ["gstack-cc", "gsc"]
display_name = "gstack (Claude Code)"
target_runtime = "Claude Code"
detect_binaries = ["claude"]
launch_binary = "claude"

[package]
kind = "git-worktree"
repository = "https://github.com/garrytan/gstack"
setup = ["setup", "--host", "claude", "--no-prefix", "--quiet"]
update = ["setup", "--host", "claude", "--no-prefix", "--quiet"]
self_update = "managed-by-hm"

[isolation]
subdir = "gstack-claude"
spoof_home = true
home_subdirs = []
caveat = "gstack-claude harness: Claude Code with gstack skills installed into the harness-local HOME."

[isolation.static_envs]
CLAUDE_CONFIG_DIR = "{home}/.claude"
CLAUDE_CODE_TMPDIR = "{tmp}"
CLAUDE_CODE_DEBUG_LOGS_DIR = "{state}/logs"
DISABLE_UPDATES = "1"
DISABLE_AUTOUPDATER = "1"
CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"
CLAUDE_CODE_SUBPROCESS_ENV_SCRUB = "1"

[[isolation.seed_files]]
path = "{home}/.claude/settings.json"
content = '''
{
  "permissions": { "defaultMode": "ask" }
}
'''
overwrite = false
