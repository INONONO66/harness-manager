schema_version = 1
id = "superpowers-claude"
aliases = ["superpowers-cc", "spc"]
display_name = "superpowers (Claude Code)"
target_runtime = "Claude Code"
detect_binaries = ["claude"]
launch_binary = "claude"

[package]
kind = "custom"
install = ["claude", "plugin", "install", "--scope", "user", "superpowers@claude-plugins-official"]
update = ["claude", "plugin", "update", "--scope", "user", "superpowers"]
uninstall = ["claude", "plugin", "uninstall", "--scope", "user", "--yes", "superpowers"]
self_update = "managed-by-hm"

[isolation]
subdir = "superpowers-claude"
home_subdirs = []
caveat = "superpowers-claude harness: Claude Code with the Superpowers plugin installed into the harness-local HOME."

[isolation.static_envs]
CLAUDE_CONFIG_DIR = "{home}/.claude"
CLAUDE_CODE_TMPDIR = "{tmp}"
CLAUDE_CODE_DEBUG_LOGS_DIR = "{state}/logs"
DISABLE_UPDATES = "1"
DISABLE_AUTOUPDATER = "1"
CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"
CLAUDE_CODE_SUBPROCESS_ENV_SCRUB = "1"

[[isolation.seed_files]]
path = "{home}/.claude/settings.json"
content = '''
{
  "permissions": { "defaultMode": "ask" }
}
'''
overwrite = false
