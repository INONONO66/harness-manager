schema_version = 1
id = "omo"
display_name = "oh-my-openagent"
target_runtime = "OpenCode"
detect_binaries = ["opencode"]
launch_binary = "opencode"

[package]
kind = "bunx-installer"
package = "oh-my-openagent"
args = [
  "install",
  "--no-tui",
  "--platform=opencode",
  "--claude=no",
  "--openai=no",
  "--gemini=no",
  "--copilot=no",
  "--skip-auth",
]

[isolation]
subdir = "omo"
spoof_home = true
home_subdirs = []
caveat = "omo harness: OpenCode with oh-my-openagent plugin."

[isolation.static_envs]
XDG_CONFIG_HOME = "{runtime_home}/.config"
XDG_DATA_HOME = "{runtime_home}/.local/share"
XDG_CACHE_HOME = "{runtime_home}/.cache"
XDG_STATE_HOME = "{runtime_home}/.local/state"
OPENCODE_CONFIG_DIR = "{runtime_home}/.config/opencode"
OPENCODE_DISABLE_AUTOUPDATE = "1"
OPENCODE_DISABLE_PROJECT_CONFIG = "1"
