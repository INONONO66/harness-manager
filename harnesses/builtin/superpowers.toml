schema_version = 1
id = "superpowers"
aliases = ["sp"]
display_name = "superpowers"
target_runtime = "Codex CLI"
detect_binaries = ["codex"]
launch_binary = "codex"

[package]
kind = "custom"
install = ["codex", "plugin", "add", "superpowers"]
update = ["codex", "plugin", "add", "superpowers"]
uninstall = ["codex", "plugin", "remove", "superpowers"]
self_update = "managed-by-hm"

[isolation]
subdir = "superpowers"
home_subdirs = []
caveat = "superpowers harness: Codex CLI with the Superpowers plugin installed into the harness-local CODEX_HOME."

[isolation.static_envs]
CODEX_HOME = "{home}/.codex"

[[isolation.seed_files]]
path = "{home}/.codex/config.toml"
content = '''
analytics_enabled = false
check_for_update_on_startup = false
cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "file"
'''
overwrite = false
