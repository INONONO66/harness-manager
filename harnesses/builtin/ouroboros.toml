schema_version = 1
id = "ouroboros"
display_name = "ouroboros"
target_runtime = "Codex CLI"
detect_binaries = ["ouroboros"]
launch_binary = "ouroboros"

[package]
kind = "python-tool"
package = "ouroboros-ai[claude]"
self_update = "managed-by-hm"

[isolation]
subdir = "ouroboros"
home_subdirs = [".ouroboros"]
caveat = "ouroboros harness: Codex CLI with ouroboros workflow engine. Run `ouroboros setup --runtime codex` after install."

[isolation.static_envs]
CODEX_HOME = "{home}/.codex"

[[isolation.seed_files]]
path = "{home}/.codex/config.toml"
content = '''
analytics_enabled = false
check_for_update_on_startup = false
cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "file"
'''
overwrite = false
