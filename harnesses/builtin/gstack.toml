schema_version = 1
id = "gstack"
aliases = ["gs"]
display_name = "gstack"
target_runtime = "Codex CLI"
detect_binaries = ["codex"]
launch_binary = "codex"

[package]
kind = "git-worktree"
repository = "https://github.com/garrytan/gstack"
setup = ["setup", "--host", "codex", "--no-prefix", "--quiet"]
update = ["setup", "--host", "codex", "--no-prefix", "--quiet"]
self_update = "managed-by-hm"

[isolation]
subdir = "gstack"
home_subdirs = []
caveat = "gstack harness: Codex CLI with gstack skills installed into the harness-local CODEX_HOME."

[isolation.static_envs]
CODEX_HOME = "{home}/.codex"

[[isolation.seed_files]]
path = "{home}/.codex/config.toml"
content = '''
analytics_enabled = false
check_for_update_on_startup = false
cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "file"
'''
overwrite = false
