schema_version = 1
id = "omc"
display_name = "oh-my-claudecode"
target_runtime = "Claude Code"
detect_binaries = ["omc"]

[package]
kind = "npm-global"
package = "oh-my-claude-sisyphus"

[isolation]
subdir = "omc"
spoof_home = true
home_subdirs = []
caveat = "omc harness: Claude Code with oh-my-claudecode plugin. Install omc first: hm harness install omc"

[isolation.static_envs]
CLAUDE_CONFIG_DIR = "{runtime_home}/.claude"
CLAUDE_CODE_TMPDIR = "{tmp}"
CLAUDE_CODE_DEBUG_LOGS_DIR = "{runtime_logs}"
DISABLE_UPDATES = "1"
DISABLE_AUTOUPDATER = "1"
CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"
ENABLE_CLAUDEAI_MCP_SERVERS = "false"
CLAUDE_CODE_SUBPROCESS_ENV_SCRUB = "1"

[[isolation.seed_files]]
path = "{runtime_home}/.claude/settings.json"
content = '''
{
  "permissions": { "defaultMode": "ask" },
  "enabledPlugins": { "oh-my-claudecode": true }
}
'''
overwrite = false
