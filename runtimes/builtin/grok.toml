schema_version = 1
name = "Grok CLI"
binary_names = ["grok"]
version_arg = "--version"
config_files = ["user-settings.json"]

[config_locator]
kind = "env-or-home"
env = ""
home_relative = ".grok"

[[auth_probes]]
kind = "json-file"
relative_path = "user-settings.json"
existence_field = "apiKey"
label = "API key"

[[auth_probes]]
kind = "env-keys"
vars = ["GROK_API_KEY"]
label = "API key"

[auth_login]
kind = "message"
lines = [
    "Grok CLI uses a Grok API key.",
    "Set `GROK_API_KEY`, run `grok -k <key>`, or save apiKey in ~/.grok/user-settings.json.",
    "Install with: curl -fsSL https://raw.githubusercontent.com/superagent-ai/grok-cli/main/install.sh | bash",
]

[shared_state]
database_dirs = [".grok"]
auth_files = [".grok/user-settings.json"]

[injection]
strategy = "env"
provider = "xai"
supported_providers = ["xai"]
endpoint_env = "GROK_BASE_URL"
api_key_env = "GROK_API_KEY"
strip_envs = ["GROK_API_KEY", "GROK_BASE_URL", "GROK_MODEL", "GROK_MAX_TOKENS"]
endpoint_strip_v1 = false

[isolation]
subdir = "grok"
spoof_home = true
home_subdirs = [
    ".grok",
]
