schema_version = 1
name = "OpenCode"
binary_names = ["opencode"]
version_arg = "--version"
config_files = ["opencode.jsonc", "opencode.json"]

[config_locator]
kind = "xdg-config"
subdir = "opencode"
env_override = "OPENCODE_CONFIG_DIR"

[[auth_probes]]
kind = "data-dir-json-file"
data_subdir = "opencode"
file_name = "auth.json"
label = "Provider auth"

[[auth_probes]]
kind = "env-keys"
vars = ["ANTHROPIC_API_KEY", "OPENAI_API_KEY", "GOOGLE_API_KEY", "GROQ_API_KEY"]
label = "API key"

[auth_login]
kind = "message"
lines = [
    "OpenCode uses provider-specific authentication.",
    "Set API keys via environment variables:",
    "  export ANTHROPIC_API_KEY=sk-...",
    "  export OPENAI_API_KEY=sk-...",
    "Or run `opencode` to authenticate interactively.",
]

[shared_state]
session_file_globs = [".local/share/opencode/opencode.db*"]
session_dirs = [
    ".local/share/opencode/storage/session",
    ".local/share/opencode/storage/message",
    ".local/share/opencode/storage/part",
    ".local/share/opencode/storage/session_diff",
]
session_dir_globs = [".local/share/opencode/project/*/storage"]

[injection]
strategy = "provider-config-seed"
config_path = "{home}/.config/opencode/opencode.json"
root_key = "provider"
provider_base_url_key = "options.baseURL"
provider_api_key_key = "options.apiKey"
provider_headers_key = "options.headers"
supported_providers = [
    "anthropic",
    "openai",
    "google",
    "openrouter",
    "groq",
    "xai",
    "deepseek",
    "mistral",
    "azure",
    "togetherai",
    "fireworks-ai",
    "zai",
    "zhipuai",
]
overwrite = false
endpoint_strip_v1 = false
legacy_provider = "openai"

[injection.provider_api_key_envs]
anthropic = "ANTHROPIC_API_KEY"
openai = "OPENAI_API_KEY"
google = "GOOGLE_API_KEY"
openrouter = "OPENROUTER_API_KEY"
groq = "GROQ_API_KEY"
xai = "XAI_API_KEY"
deepseek = "DEEPSEEK_API_KEY"
mistral = "MISTRAL_API_KEY"
azure = "AZURE_API_KEY"
togetherai = "TOGETHER_API_KEY"
fireworks-ai = "FIREWORKS_API_KEY"
zai = "ZAI_API_KEY"
zhipuai = "ZAI_API_KEY"

[injection.provider_header_overrides.anthropic]
"x-api-key" = "{bearer}"
"Authorization" = "Bearer {bearer}"

[isolation]
subdir = "opencode"
spoof_home = true
home_subdirs = [
    ".config/opencode",
    ".local/share/opencode",
    ".cache/opencode",
    ".local/state/opencode",
]

[isolation.static_envs]
XDG_CONFIG_HOME = "{home}/.config"
XDG_DATA_HOME = "{home}/.local/share"
XDG_CACHE_HOME = "{home}/.cache"
XDG_STATE_HOME = "{home}/.local/state"
OPENCODE_DISABLE_AUTOUPDATE = "1"
OPENCODE_DISABLE_PROJECT_CONFIG = "1"
