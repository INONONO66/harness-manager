schema_version = 1
name = "Claude Code"
binary_names = ["claude"]
version_arg = "--version"
config_files = ["settings.json"]

[config_locator]
kind = "env-or-home"
env = "CLAUDE_CONFIG_DIR"
home_relative = ".claude"

[[auth_probes]]
kind = "nested-oauth-file"
relative_path = ".credentials.json"
path = ["claudeAiOauth", "accessToken"]
label = "OAuth"

[[auth_probes]]
kind = "keychain-heuristic"
marker_file = "settings.json"
keychain_service = "Claude Code-credentials"
label = "OAuth (macOS Keychain)"

[[auth_probes]]
kind = "env-keys"
vars = ["ANTHROPIC_API_KEY", "ANTHROPIC_AUTH_TOKEN"]
label = "API key"

[auth_login]
kind = "exec"
label = "Claude Code"
binary = "claude"
args = []

[injection]
strategy = "env"
provider = "anthropic"
supported_providers = ["anthropic"]
endpoint_env = "ANTHROPIC_BASE_URL"
api_key_env = "ANTHROPIC_API_KEY"
strip_envs = ["ANTHROPIC_API_KEY", "ANTHROPIC_AUTH_TOKEN", "ANTHROPIC_BASE_URL"]
endpoint_strip_v1 = true

[isolation]
subdir = "claude"
spoof_home = true
home_subdirs = [".claude"]
caveat = "Claude default mode uses apiKeyHelper and disables /login to avoid macOS Keychain. Run `printf '%s' '<key>' | hm secret set claude-api-key` before first use, or pass --allow-keychain for OAuth mode."

[isolation.static_envs]
CLAUDE_CONFIG_DIR = "{home}/.claude"
CLAUDE_CODE_TMPDIR = "{tmp}"
CLAUDE_CODE_DEBUG_LOGS_DIR = "{runtime_logs}"
DISABLE_UPDATES = "1"
DISABLE_AUTOUPDATER = "1"
CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"
CLAUDE_CODE_DISABLE_OFFICIAL_MARKETPLACE_AUTOINSTALL = "1"
ENABLE_CLAUDEAI_MCP_SERVERS = "false"
CLAUDE_CODE_SUBPROCESS_ENV_SCRUB = "1"
DISABLE_LOGIN_COMMAND = "1"

[[isolation.seed_files]]
path = "{home}/.claude/settings.json"
content = """
{
  "apiKeyHelper": "{state}/apikey.sh",
  "permissions": { "defaultMode": "ask" }
}
"""
overwrite = false

[[isolation.seed_files]]
path = "{state}/apikey.sh"
content = """
#!/bin/sh
exec hm secret get claude-api-key
"""
overwrite = true
mode = "0700"

[keychain_isolation]
subdir = "claude-keychain"
spoof_home = true
home_subdirs = [".claude"]
caveat = "Claude --allow-keychain mode permits OAuth and may read/write macOS Keychain entry 'Claude Code-credentials'. Use only when you explicitly want Claude subscription login."

[keychain_isolation.static_envs]
CLAUDE_CONFIG_DIR = "{home}/.claude"
CLAUDE_CODE_TMPDIR = "{tmp}"
CLAUDE_CODE_DEBUG_LOGS_DIR = "{runtime_logs}"
DISABLE_UPDATES = "1"
DISABLE_AUTOUPDATER = "1"
CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"
CLAUDE_CODE_DISABLE_OFFICIAL_MARKETPLACE_AUTOINSTALL = "1"
ENABLE_CLAUDEAI_MCP_SERVERS = "false"
CLAUDE_CODE_SUBPROCESS_ENV_SCRUB = "1"
