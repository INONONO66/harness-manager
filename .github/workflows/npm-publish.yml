name: npm Publish

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.2.8
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="$(git tag --points-at HEAD | grep '^v' | sort -V | tail -1)"
          fi
          case "$tag" in
            v*) ;;
            *) echo "expected release tag starting with v, got: $tag" >&2; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Verify release tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "${{ steps.release.outputs.tag }}" = "v$version"

      - name: Verify trusted publishing environment
        env:
          NPM_TOKEN: ""
          NODE_AUTH_TOKEN: ""
        run: |
          test -z "${NPM_TOKEN:-}"
          test -z "${NODE_AUTH_TOKEN:-}"
          npm config delete //registry.npmjs.org/:_authToken --userconfig "$NPM_CONFIG_USERCONFIG" || true
          npm --version
          node --version

      - name: Validate package
        env:
          NPM_TOKEN: ""
          NODE_AUTH_TOKEN: ""
        run: |
          npm run test:npm-package
          npm pack --dry-run

      - name: Publish through npm trusted publishing
        env:
          NPM_TOKEN: ""
          NODE_AUTH_TOKEN: ""
        run: npm publish --access public
